<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Page Application</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Additional CSS for layout */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        nav ul li {
            margin-right: 20px;
        }

        nav ul li:last-child {
            margin-right: 0;
        }

        /* Sidebar CSS */
        .sidebar {
            width: 200px; /* Adjust width as needed */
            background-color: #f4f4f4; /* Example background color */
            padding: 20px;
        }

        .sidebar input[type="text"],
        .sidebar input[type="password"] {
            width: calc(100% - 40px);
            margin-bottom: 10px;
            padding: 5px;
        }

        .sidebar input[type="submit"] {
            width: calc(100% - 40px);
            padding: 10px;
            background-color: #4caf50; /* Example button color */
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="../public/pong-retro-logo-3@2x.png" alt="Logo">
        </div>
        <nav>
            <ul>
                <li><a href="#History">Home</a></li>
                <li><a href="#FAQ">About</a></li>
                <li><a href="#About">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="sidebar">
        <!-- Sidebar content -->
        <img src="../public/avatar-2@2x.png" alt="Profile Photo/Avatar">
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <input type="submit" value="Login">
        <input type="submit" value="Sign Up">
    </div>

    <div id="main-content">
        <!-- Content will be dynamically loaded here -->
    </div>

    <script src="script.js"></script>
</body>
</html>
