        <link rel="icon" href="images/pong-retro-logo-3@2x.png" type="image/png">
        <title>Pong</title>
        <link rel="stylesheet" href="styles.css">
        <!--insert bootstrap-->

    <body>
        <header>
            <div class="container-fluid">
                <div class="row">
                    <nav class="my-navbar">
                        <a class="my-navbar-brand active" aria-current="page" href="#HomePage">
                            <img  class="logo" id="logo" src="images/pong-retro-logo-3@2x.png" alt="Logo Pong">
                        </a>
                        <ul class="my-nav">
                            <li class="my-nav-item" >
                                <a class="my-nav-link" href="#History">History</a>
                            </li>
                            <li class="my-nav-item">
                                <a class="my-nav-link" href="#FAQ">FAQ</a>
                            </li>
                            <li class="my-nav-item">
                                <a class="my-nav-link" href="#About">About</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </header>
        <main>
            <div class="container-fluid">
                <div class="row">
                    <aside>
                        <!-- sidebar content before login -->
                        <div class="sidebar-before-login" id="sidebar-before-login">
                            <h2>Get Started</h2>
                            <p>Sign up/login to start playing</p>
                            <button class="btn btn-primary" id="login-button">Login</button>
                            <button class="btn btn-primary" id="signup-button">Sign Up</button>
                        </div>
                        <!-- sidebar content after login -->
                        <div class="sidebar-after-login" style="display:none;">
                            <img src="images/avatar-2@2x.png" alt="Profile Picture" class="profile-pic">
                            <div class="user-info">
                                <p id="username">afs_2010</p> <!-- Placeholder for dynamic username -->
                                <p>Elo Rating: <span id="elo-rating">13059</span></p> <!-- Placeholder for dynamic Elo rating -->
                                <p>Rank: <span id="rank">3rd</span></p> <!-- Placeholder for dynamic rank -->
                            </div>
                            <button class="sidebar-button play" id="play-button">Play</button>
                            <button class="sidebar-button" id="social-button">Social</button>
                            <button class="sidebar-button" id="my-profile-button">My Profile</button>
                            <button class="sidebar-button" id="stats-button">Stats</button>
                            <button class="sidebar-button" id="settings-button">Settings</button>
                            <button class="sidebar-button log-out" id="logout-button">Logout</button>
                        </div>
                    </aside>
                </div>
            </div>
        </main>
